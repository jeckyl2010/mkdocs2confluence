name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Security scan (bandit)
        run: uv run bandit -r src -ll -q

      - name: Dead code (vulture)
        run: uv run vulture src --min-confidence 80

      - name: Complexity report (radon)
        run: |
          echo "## Cyclomatic Complexity (C and above)" >> $GITHUB_STEP_SUMMARY
          uv run radon cc src -a -n C --md >> $GITHUB_STEP_SUMMARY

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
